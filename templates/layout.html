<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowbite Flask</title>
    <link rel="stylesheet" href="{{url_for('static',filename='dist/output.css')}}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
<nav class="bg-white border-gray-200 px-2 sm:px-4 py-2.5 rounded-sm dark:bg-gray-900">
<div class="container flex items-center justify-center mx-auto relative">

    <!-- Logo izquierda -->
    <div class="absolute left-0 flex items-center">
        <img src="{{url_for('static',filename='img/IDGS805.png')}}" class="rounded-2xl h-6 mr-3 sm:h-9">
        <span class="text-xl font-semibold dark:text-white">Flask IDGS</span>
    </div>

    <!-- MENU CENTRADO -->
    <ul class="flex space-x-8 text-sm font-medium">
        <li>
            <a href="{{url_for('alumnos.index')}}" class="text-white hover:text-gray-300">
                Alumnos
            </a>
        </li>

        <li>
            <a href="{{url_for('maestros.listado')}}" class="text-white hover:text-gray-300">
                Maestros
            </a>
        </li>

        <li>
            <a href="{{ url_for('cursos.index') }}" class="text-white hover:text-gray-300">
                Cursos
            </a>
        </li>
    </ul>

</div>
</nav>

    <div class="flex items-center justify-center min-h-scree">

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="fixed top-6 right-6 z-50 space-y-2">
            {% for message in messages %}
            <div class="bg-green-100 border border-green-400 text-green-800 px-4 py-3 rounded-lg shadow-lg">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        {% block container%}

        {% endblock %}

    </div>


    <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>
</body>

</html>
